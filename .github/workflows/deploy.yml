name: Implantação de energia solar WTR Energia

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build assets
        run: npm run build

      - name: Prepare deploy
        run: |
          mkdir -p deploy/styles
          mkdir -p deploy/scripts
          cp index.html deploy/
          cp -r assets deploy/
          cp -r branding deploy/
          cp -r dist/styles deploy/styles/
          cp -r dist/scripts deploy/scripts/
          cp -r pages deploy/ || true

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: false
          enable_jekyll: false