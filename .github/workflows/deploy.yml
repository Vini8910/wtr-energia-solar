name: Deploy WTR Energia Solar

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build assets
        run: npm run build

      - name: Prepare deploy
        run: |
          mkdir deploy
          cp index.html deploy/
          cp -r assets deploy/
          cp -r branding deploy/
          cp -r dist deploy/
          cp -r pages deploy/ || true

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy